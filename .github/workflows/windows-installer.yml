name: Instalador Windows

# Compila el instalador de Windows (no se puede generar desde Linux: el bundle
# Flutter para Windows requiere Visual Studio). Patrón replicado de SIGARN:
# flutter-action channel stable SIN fijar versión (la detección de Visual Studio
# falla si se fija), Inno Setup ya viene en el runner, se empaqueta el VC++
# Redistributable y se publica como GitHub Release (no artifact: la cuota de
# artifacts se llena con los builds históricos).

on:
  # SOLO disparo manual (como SIGARN): el instalador NUNCA se publica solo en
  # cada push. Se genera bajo demanda desde Actions → "Run workflow", y siempre
  # construye lo que diga pcinfo/lib/version.dart.
  workflow_dispatch:

jobs:
  build-windows:
    # windows-2022 = Visual Studio 2022 (v17). NO usar windows-latest: trae
    # VS 2026 (v18), que Flutter stable aún no mapea a un generador CMake y cae
    # al viejo "Visual Studio 16 2019" → falla la compilación.
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # Versión y revisión SIEMPRE desde version.dart (única fuente de verdad).
      # Antes estaban hardcodeadas en defaults → un push publicaba con Rev viejo.
      - name: Resolver versión desde version.dart
        shell: pwsh
        run: |
          $dart = Get-Content pcinfo/lib/version.dart -Raw
          $ver = [regex]::Match($dart, "appVersion = '([^']+)'").Groups[1].Value
          $rev = [regex]::Match($dart, 'appRevision = (\d+)').Groups[1].Value
          "VERSION=$ver"  | Out-File -FilePath $env:GITHUB_ENV -Append
          "REVISION=$rev" | Out-File -FilePath $env:GITHUB_ENV -Append
          "PCINFO_NAME=pcinfo_v${ver}_rev-${rev}" | Out-File -FilePath $env:GITHUB_ENV -Append
          Write-Host "Construyendo PCInfo v$ver Rev $rev"

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Compilar backend Go (.exe)
        working-directory: backend
        # -H windowsgui = subsistema GUI: el backend NO abre ventana de consola
        # (antes se veía el cmd negro "PCInfo backend escuchando..." al iniciar).
        run: go build -ldflags "-s -w -H windowsgui" -o pcinfo-backend.exe .

      - name: Empaquetar smartctl (smartmontools) para el backend
        shell: pwsh
        # Sin smartctl.exe en Windows la ficha de discos sale "SIN SMART".
        # choco lo instala en C:\Program Files\smartmontools\bin; copiamos el
        # binario + drivedb.h junto al backend para que el instalador los meta.
        run: |
          choco install smartmontools -y --no-progress
          $bin = "C:\Program Files\smartmontools\bin"
          Copy-Item "$bin\smartctl.exe" "backend\smartctl.exe" -Force
          Copy-Item "$bin\drivedb.h"    "backend\drivedb.h"    -Force
          if (-not (Test-Path "backend\smartctl.exe")) { throw "smartctl.exe no encontrado" }
          if (-not (Test-Path "backend\drivedb.h"))    { throw "drivedb.h no encontrado" }

      - name: Compilar GUI Flutter (Windows release)
        working-directory: pcinfo
        run: flutter build windows --release

      # Verifica que el manifiesto incrustado NO pida administrador: la GUI debe
      # correr como asInvoker para ABRIR SIEMPRE (requireAdministrator rompía el
      # arranque, Rev 11/12 no abrían ni con "Ejecutar como admin"). La elevación
      # se pide solo para el backend en runtime (Start-Process -Verb RunAs).
      - name: Verificar que el exe NO exige administrador (asInvoker)
        shell: pwsh
        run: |
          $exe = "pcinfo\build\windows\x64\runner\Release\pcinfo.exe"
          $mt = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\mt.exe" -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $mt) { throw "mt.exe no encontrado" }
          & $mt.FullName -nologo "-inputresource:$exe;#1" "-out:manifest.xml"
          $m = Get-Content manifest.xml -Raw
          Write-Host $m
          if ($m -match 'requireAdministrator') { throw "El exe EXIGE administrador; debe ser asInvoker para abrir siempre" }
          Write-Host "OK: el exe corre como asInvoker (abre siempre)"

      # Copia el runtime de Visual C++ JUNTO al exe (app-local). Windows carga
      # primero las DLL de la carpeta del ejecutable, así la app arranca aunque el
      # instalador del redist no haya corrido (típico en imágenes mínimas LTSB/LTSC).
      - name: Empaquetar runtime VC++ app-local (junto al exe)
        shell: pwsh
        run: |
          $rel = "pcinfo\build\windows\x64\runner\Release"
          $crt = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\*\VC\Redist\MSVC\*\x64\Microsoft.VC143.CRT" -Directory -ErrorAction SilentlyContinue | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $crt) { throw "No se encontró Microsoft.VC143.CRT del redist" }
          Write-Host "CRT: $($crt.FullName)"
          Copy-Item "$($crt.FullName)\*.dll" $rel -Force
          if (-not (Test-Path "$rel\vcruntime140.dll")) { throw "vcruntime140.dll no se copió" }
          Get-ChildItem "$rel\*.dll" | Where-Object { $_.Name -match '^(vcruntime|msvcp|concrt|vccorlib)' } | Format-Table Name -AutoSize

      - name: Descargar VC++ Redistributable
        run: Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "construir\vc_redist.x64.exe"

      - name: Generar instalador con Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DSourceFlutter=${{ github.workspace }}\pcinfo\build\windows\x64\runner\Release" `
            "/DSourceBackend=${{ github.workspace }}\backend\pcinfo-backend.exe" `
            "/DSourceSmartctl=${{ github.workspace }}\backend\smartctl.exe" `
            "/DSourceDrivedb=${{ github.workspace }}\backend\drivedb.h" `
            "/DVcRedist=${{ github.workspace }}\construir\vc_redist.x64.exe" `
            "/DOutDir=${{ github.workspace }}\instaladores" `
            "/DBaseName=$env:PCINFO_NAME" `
            "/DAppVer=$env:VERSION" `
            "${{ github.workspace }}\construir\instalador_windows.iss"

      # Publicar en GitHub Release (NO artifact): los release assets no consumen
      # la cuota de almacenamiento de Actions.
      - name: Publicar instalador (Release)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="win-v${VERSION}-rev${REVISION}"
          gh release create "$TAG" "instaladores/${PCINFO_NAME}.exe" \
            --title "PCInfo v${VERSION} Rev ${REVISION} (Windows)" \
            --notes "Instalador Windows generado por CI." \
            || gh release upload "$TAG" "instaladores/${PCINFO_NAME}.exe" --clobber
